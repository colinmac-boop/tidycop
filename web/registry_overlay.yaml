# tidycop overlay registry — citycrimemap.us downstream additions
#
# Cities here are NOT in upstream R `tidycops` incident_registry.R and
# therefore cannot ship in `registry/cities.yaml` (see AGENTS.md § Hard
# Boundary). They live here because CityCrimeMap ships them as a
# downstream product, exactly like the SpotCrime data2 Boise overlay
# at ~/.openclaw/workspace/spotcrime_sources/cities.yaml.
#
# Loaded via `tidycop.get_incidents(..., registry_path=...)` from
# `web/scripts/fetch_data.py` for cities whose `overlay: true` flag is
# set in `web/scripts/cities.py`.
#
# Boundary rule: do not migrate anything from this file into
# registry/cities.yaml. The pre-commit guard
# (scripts/check_no_downstream_cities.py) will reject it.

schema_version: 1

cities:

  # ──────────────────────────────────────────────────────────────────────────
  # BALTIMORE — BPD ArcGIS NIBRS Group A
  # ──────────────────────────────────────────────────────────────────────────
  # NIBRS Group A feed is the current active source (as of 2026-07-09
  # freshest row is ~2 days old, ~6,800 rows/45d). BPD's older
  # Part1_Crime dataset stopped updating 2023-02; Part1_Crime_Beta
  # stopped 2024-12; this NIBRS layer is the live one going forward.
  baltimore:
    display_name: "Baltimore"
    timezone: "America/New_York"
    aliases: ["baltimore_md", "bpd"]
    sources:
      - source_id: "baltimore_nibrs_group_a"
        display_name: "BPD NIBRS Group A Crime Data"
        provider: "arcgis"
        dataset_id: "NIBRS_GroupA_Crime_Data"
        base_url: "https://services1.arcgis.com/UWYHeuuJISiGmgXx/ArcGIS/rest/services/NIBRS_GroupA_Crime_Data/FeatureServer/0"
        date_field: "CrimeDateTime"
        arcgis_date_field_type: "date"
        object_id_field: "RowID"
        order_by: "RowID DESC"
        return_geometry: true
        active_from: null
        active_to: null
        # BPD's Description column is NIBRS-style, mostly clean labels
        # like "COMMON ASSAULT", "AGG. ASSAULT", "ROBBERY - CARJACKING",
        # "BURGLARY", "LARCENY", "LARCENY FROM AUTO", "HOMICIDE".
        # Homicide → Shooting per the 2026-05-26 fatal-shooting collapse.
        # Categories reflect what BPD's NIBRS_GroupA feed actually
          # emits (verified 2026-07-09 against 1500 rows / 45 days).
          # Fatal shootings collapse into Shooting per the 2026-05-26
          # convention. Sexual assault (RAPE) maps to Assault, matching
          # how tidycop-spotcrime handles sex offenses across cities.
          # SHOPLIFTING and LARCENY OF MOTOR VEHICLE PARTS both bucket
          # to Theft. INTIMIDATION is threats/harassment; standard
          # NIBRS handling puts it under Assault since the crime-
          # against-persons framing is the same.
        spotcrime_category_map:
          HOMICIDE: "Shooting"
          SHOOTING: "Shooting"
          "ROBBERY": "Robbery"
          "ROBBERY - COMMERCIAL": "Robbery"
          "ROBBERY - STREET": "Robbery"
          "ROBBERY - RESIDENCE": "Robbery"
          "ROBBERY - CARJACKING": "Robbery"
          "COMMON ASSAULT": "Assault"
          "AGG. ASSAULT": "Assault"
          "INTIMIDATION": "Assault"
          "BURGLARY": "Burglary"
          "LARCENY": "Theft"
          "LARCENY FROM AUTO": "Theft"
          "LARCENY OF MOTOR VEHICLE PARTS OR ACCESSORIES": "Theft"
          "AUTO THEFT": "Theft"
          "SHOPLIFTING": "Theft"
          "FRAUD": "Theft"  # identity theft / wire fraud → Theft bucket
          "STOLEN PROPERTY": "Theft"
          "ARSON": "Arson"
          "VANDALISM": "Vandalism"
          "RAPE": "Assault"
          "SEX OFFENSES": "Assault"
          # KIDNAPPING / HUMAN TRAFFICKING / PORNOGRAPHY appear at
          # single-digit volumes and are not in the 8-bucket taxonomy;
          # they intentionally fall through to Unclassified and are
          # filtered out downstream.
        field_map:
          std_source_record_id: ["CCNumber", "RowID"]
          std_incident_id: ["CCNumber", "RowID"]
          std_incident_number: "CCNumber"
          std_incident_date: "CrimeDateTime"
          std_reported_date: null
          std_offense_code: "CrimeCode"
          std_offense_description: "Description"
          std_offense_category: "Description"
          std_disposition: null
          std_address: "Location"
          std_zip_code: null
          std_neighborhood: "Neighborhood"
          std_district: "New_District"
          std_beat: "Post"
          std_division: null
          std_latitude: "geometry_y"
          std_longitude: "geometry_x"

  # ──────────────────────────────────────────────────────────────────────────
  # LOS ANGELES — LAPD Socrata NIBRS Offenses
  # ──────────────────────────────────────────────────────────────────────────
  # LAPD retired the 2020-2024 dataset (2nrs-mtv8) in 2024 when they
  # transitioned to the FBI's National Incident-Based Reporting System
  # (NIBRS). The current dataset (y8y3-fqfu) tracks NIBRS offenses
  # 2024-present.
  #
  # KNOWN FRESHNESS CAVEAT (2026-07-09): the LAPD public portal is
  # running ~6 months behind real time. Freshest row available is
  # 2025-12-31. This is a portal-level lag, not a tidycop bug. LAPD
  # has been publishing crime stats via annual press releases while
  # the open-data pipeline catches up. Ship with a wide window so we
  # surface a meaningful sample, and surface the lag honestly in the
  # frontend copy.
  los_angeles:
    display_name: "Los Angeles"
    timezone: "America/Los_Angeles"
    aliases: ["la", "los_angeles_ca", "lapd"]
    sources:
      - source_id: "la_nibrs_offenses"
        display_name: "LAPD NIBRS Offenses Dataset 2024 to Present"
        provider: "socrata"
        dataset_id: "y8y3-fqfu"
        base_url: "https://data.lacity.org/resource/y8y3-fqfu.json"
        date_field: "date_occ"
        active_from: "2024-03-07"  # NIBRS transition date per LAPD
        active_to: null
        # LAPD NIBRS descriptions include the CA Penal Code + NIBRS
        # code in one string, e.g. "594(B)(2)(A) - PC - M - Vandalism
        # Less Than $400 - Misd - 290". Exact-match mapping is not
        # practical; the classifier will fall through to
        # description-based pattern matching. We do map the a few
        # exact NIBRS group A codes when the feed emits them cleanly.
        # For coverage we lean on tidycop-spotcrime's NIBRS keyword
        # matcher (which reads std_offense_description).
        spotcrime_category_map:
          "487(D)(1) - PC - F - Grand Theft Auto - GTA  - 240": "Theft"
          "594(B)(1) - PC - F - Vandalism ($400 Or More) - Felony - 290": "Vandalism"
