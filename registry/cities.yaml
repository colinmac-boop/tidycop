  # ──────────────────────────────────────────────────────────────────────────
  # DETROIT — ArcGIS
  # ──────────────────────────────────────────────────────────────────────────
  detroit:
    display_name: "Detroit"
    timezone: "America/New_York"
    aliases: ["detroit_mi"]
    sources:
      - source_id: "detroit_rms_crime_incidents"
