  # ──────────────────────────────────────────────────────────────────────────
  # HOUSTON — ArcGIS, four NIBRS group layers (rolling recent window)
  # ──────────────────────────────────────────────────────────────────────────
  houston:
    display_name: "Houston"
    timezone: "America/Chicago"
    aliases: ["houston_tx", "htx"]
    sources:
      - source_id: "houston_group_a_person"
        display_name: "HPD NIBRS Recent Crime Reports - Group A Person"
        provider: "arcgis"
        dataset_id: "hpd_nibrs_recent_crime_reports_layer_0"
        base_url: "https://mycity2.houstontx.gov/pubgis02/rest/services/HPD/NIBRS_Recent_Crime_Reports/FeatureServer/0"
        date_field: "USER_RMSOccurrenceDate"
        arcgis_date_field_type: "date"
        object_id_field: "OBJECTID"
        order_by: "OBJECTID DESC"
        return_geometry: true
        active_from: "2026-03-29"
        active_to: null
        source_status: "rolling_window"
        source_note: "HPD ArcGIS feed is a recent rolling window (observed earliest date 2026-03-29 as of 2026-04-30); all layers are point geometry. Location context is street/block + beat/district, not areal geometries."
        # NIBRS-clean. Houston exposes NIBRS_Description directly; values are
        # canonical NIBRS group names ("Simple assault", "Aggravated Assault",
        # "Murder, non-negligent", etc.). Same vocabulary across all 4 Houston
        # layers (Person/Property/Society/Group B), so anchor it once.
        # NOTE: tidycop's _select_source picks only one source per request;
        # for Houston that's currently group_a_person. Property/Society/
        # Group-B rows aren't reached today — if/when tidycop grows source
        # fanout, this map will cover those layers too.
        spotcrime_category_map: &houston_spotcrime
          # Violent crimes against persons
          Murder, non-negligent: "Shooting"
          Negligent manslaughter: "Shooting"
          Simple assault: "Assault"
          Aggravated Assault: "Assault"
          Intimidation: "Assault"
          # Robbery, burglary, theft (Group A Property, when reachable)
          Robbery: "Robbery"
          Burglary/Breaking & Entering: "Burglary"
          Pocket-picking: "Theft"
          Purse-snatching: "Theft"
          Shoplifting: "Theft"
          Theft From Building: "Theft"
          Theft From Coin Operated Machine or Device: "Theft"
          Theft From Motor Vehicle: "Theft"
          Theft of Motor Vehicle Parts or Accessories: "Theft"
          All Other Larceny: "Theft"
          Motor Vehicle Theft: "Theft"
          Stolen Property Offenses: "Theft"
          # Arson, vandalism
          Arson: "Arson"
          Destruction/Damage/Vandalism of Property: "Vandalism"
          # Weapons (NIBRS Group A Society)
          Weapon Law Violations: "Shooting"
          # Sex offenses, kidnapping, trafficking, Group B — not in 8-cat taxonomy
        field_map: &houston_fields
          std_source_record_id: ["USER_Incident", "OBJECTID"]
          std_incident_id: ["USER_Incident", "OBJECTID"]
          std_incident_number: "USER_Incident"
          std_incident_date: "USER_RMSOccurrenceDate"
          std_reported_date: "USER_RMSOccurrenceDate"
          std_offense_code: "USER_NIBRSClass"
          std_offense_description: "USER_NIBRSDescription"
          std_offense_category: ["USER_NIBRSDescription", "USER_NIBRSClass"]
          std_disposition: null
          std_address: ["USER_OffenseAddressMiddle", "USER_BlockRange", "USER_StreetName"]
          std_zip_code: "USER_ZIPCode"
          std_neighborhood: "SNBNAME"
          std_district: "USER_District"
          std_beat: "USER_Beat"
          std_division: null
          std_latitude: "geometry_y"
          std_longitude: "geometry_x"
