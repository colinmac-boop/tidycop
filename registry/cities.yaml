        base_url: "https://services.arcgis.com/afSMGVsC7QlRK1kZ/arcgis/rest/services/Police_Incidents_Last_2Years/FeatureServer/0"
        date_field: "reportedDateTime"
        arcgis_date_field_type: "date"
        object_id_field: "OBJECTID"
        order_by: "OBJECTID DESC"
        return_geometry: false
        active_from: "2024-04-30"
        active_to: null
        source_status: "rolling_window"
        source_note: "City feed represents a rolling last-two-years window with daily refresh."
        # MPD uses internal short codes in `offense`. The classifier matches
        # case-insensitively; codes are uppercase. Top ~25 codes cover ~98%
        # of rows. Maps below are based on city's published code dictionary
        # cross-referenced with current row descriptions.
        spotcrime_category_map:
          # Violent (fatal collapses to Shooting per 2026-05-26)
          MURDR: "Shooting"           # murder
          # Assaults
          ASLT1: "Assault"            # 1st degree
          ASLT2: "Assault"            # assault w/ dangerous weapon
          ASLT3: "Assault"            # significant bodily harm
          ASLT4: "Assault"            # less than substantial harm
          DASLT2: "Assault"           # 2nd-deg domestic
          DASLT3: "Assault"           # 3rd-deg domestic
          DASTR: "Assault"            # domestic strangulation
          # Sex offenses (CSC, CSCR) are violent but outside the 8-cat
          # taxonomy; left null.
          # Robberies
          ROBPER: "Robbery"           # robbery of person
          ROBPAG: "Robbery"           # robbery person aggravated
          ROBBIZ: "Robbery"           # robbery of business
          CARJCK: "Robbery"           # carjacking
          # Burglary
          BURGB: "Burglary"           # business
          BURGD: "Burglary"           # dwelling
          # Theft
          THEFT: "Theft"
          AUTOTH: "Theft"             # auto theft
          MVTHFT: "Theft"             # motor vehicle theft (variant)
          TFMV: "Theft"               # theft from motor vehicle
          TMVP: "Theft"               # theft motor vehicle parts
          TBLDG: "Theft"              # theft from building
          TFPER: "Theft"              # theft from person
          SHOPLF: "Theft"             # shoplifting
          BIKETF: "Theft"             # bike theft
          THFTSW: "Theft"             # theft by swindle
          POCKET: "Theft"             # pocket-picking
          COINOP: "Theft"             # coin-op theft
          # Arson
          ARSON: "Arson"
          # COMPUT (computer crime) etc. — not in 8-cat taxonomy.
        field_map:
          std_source_record_id: ["caseNumber", "OBJECTID"]
          std_incident_id: "caseNumber"
          std_incident_number: "caseNumber"
          std_incident_date: "reportedDateTime"
          std_reported_date: ["reportedDate", "enteredDate"]
          std_offense_code: "UCRCode"
          std_offense_description: "description"
          std_offense_category: "offense"
          std_disposition: null
          std_address: "publicaddress"
          std_zip_code: null
          std_neighborhood: "neighborhood"
          std_district: "precinct"
          std_beat: null
          std_division: null
          std_latitude: "centerLat"
          std_longitude: "centerLong"

