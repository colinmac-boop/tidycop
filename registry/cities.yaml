# tidycop city registry
# Ported from R/incident_registry.R in https://github.com/Steal-This-Code/tidycops (MIT)
# Schema: see tidycop/schema.py — 23 std_* columns
#
# Notes on field_map:
#   - A value may be a string (single source field) or a list (coalesce fallbacks, left-to-right)
#   - null means the source does not expose that column
#
# Aliases live in tidycop/registry.py (normalize_city_key)
# MVP cities (Week 1): chicago, seattle, san_francisco, detroit, pittsburgh

schema_version: 1

cities:

  # ──────────────────────────────────────────────────────────────────────────
  # CHICAGO — Socrata
  # ──────────────────────────────────────────────────────────────────────────
  chicago:
    display_name: "Chicago"
    timezone: "America/Chicago"
    sources:
      - source_id: "chicago_crimes"
        display_name: "Crimes - 2001 to Present"
        provider: "socrata"
        dataset_id: "ijzp-q8t2"
        base_url: "https://data.cityofchicago.org/resource/ijzp-q8t2.json"
        date_field: "date"
        active_from: null
        active_to: null
        # std_offense_category is Chicago's IUCR primary_type (uppercase).
        spotcrime_category_map:
          HOMICIDE: "Shooting"        # fatal shootings collapse here (2026-05-26)
          ROBBERY: "Robbery"
          BATTERY: "Assault"
          ASSAULT: "Assault"
          BURGLARY: "Burglary"
          THEFT: "Theft"
          MOTOR VEHICLE THEFT: "Theft"
          ARSON: "Arson"
          CRIMINAL DAMAGE: "Vandalism"
          CRIMINAL TRESPASS: "Vandalism"
          WEAPONS VIOLATION: "Shooting"  # discharge / brandishing, no separate code
          # TODO classifier: KIDNAPPING/CRIM SEXUAL ASSAULT/OFFENSE INVOLVING CHILDREN
          # are violent but not in the 8-category taxonomy; leaving unmapped.
        field_map:
          std_source_record_id: "id"
          std_incident_id: "id"
          std_incident_number: "case_number"
          std_incident_date: "date"
          std_reported_date: "date"
          std_offense_code: "iucr"
          std_offense_description: "description"
          std_offense_category: "primary_type"
          std_disposition: null
          std_address: "block"
          std_zip_code: null
          std_neighborhood: "community_area"
          std_district: "district"
          std_beat: "beat"
          std_division: null
          std_latitude: "latitude"
          std_longitude: "longitude"

  # ──────────────────────────────────────────────────────────────────────────
  # SEATTLE — Socrata
  # ──────────────────────────────────────────────────────────────────────────
  seattle:
    display_name: "Seattle"
    timezone: "America/Los_Angeles"
    sources:
      - source_id: "seattle_spd_crime"
        display_name: "SPD Crime Data: 2008-Present"
        provider: "socrata"
        dataset_id: "tazs-3rd5"
        base_url: "https://data.seattle.gov/resource/tazs-3rd5.json"
        date_field: "offense_date"
        active_from: "2008-01-01"
        active_to: null
        # Seattle: classify on nibrs_offense_code_description (granular
        # NIBRS labels) — std_offense_description in the field_map below.
        # The coarse offense_category column only carries 3 buckets
        # (PROPERTY CRIME / VIOLENT CRIME / ALL OTHER), so the classifier's
        # std_offense_category lookup misses; the fallback to
        # std_offense_description (these keys) does the work.
        # Keys are matched case-insensitively by the classifier.
        spotcrime_category_map:
          # Shooting — fatal incidents collapse here per 2026-05-26 rule;
          # weapon law violations also bucket here for visibility.
          "Murder & Nonnegligent Manslaughter": "Shooting"
          "Negligent Manslaughter": "Shooting"
          "Justifiable Homicide": "Shooting"
          "Weapon Law Violations": "Shooting"
          # Robbery
          "Robbery": "Robbery"
          # Assault — aggravated, simple, threats
          "Aggravated Assault": "Assault"
          "Simple Assault": "Assault"
          "Intimidation": "Assault"
          # Burglary — forced/unlawful entry
          "Burglary/Breaking & Entering": "Burglary"
          # Theft — larceny variants, MVT, theft from vehicle, parts theft
          "Motor Vehicle Theft": "Theft"
          "Theft From Motor Vehicle": "Theft"
          "Theft of Motor Vehicle Parts or Accessories": "Theft"
          "Theft From Building": "Theft"
          "Theft From Coin-Operated Machine or Device": "Theft"
          "Shoplifting": "Theft"
          "All Other Larceny": "Theft"
          "Pocket-picking": "Theft"
          "Purse-snatching": "Theft"
          # Arson
          "Arson": "Arson"
          # Vandalism
          "Destruction/Damage/Vandalism of Property": "Vandalism"
          # TODO classifier: KIDNAPPING/ABDUCTION, SEX OFFENSES (Rape,
          # Fondling, Sodomy, Sexual Assault With An Object, Statutory
          # Rape, Incest) intentionally unmapped — no Sexual Assault
          # bucket since 2026-05-20.
        field_map:
          std_source_record_id: "offense_id"
          std_incident_id: "offense_id"
          std_incident_number: "report_number"
          std_incident_date: "offense_date"
          std_reported_date: "report_date_time"
          std_offense_code: "nibrs_offense_code"
          std_offense_description: "nibrs_offense_code_description"
          std_offense_category: "offense_category"
          std_disposition: null
          std_address: "block_address"
          std_zip_code: null
          std_neighborhood: "neighborhood"
          std_district: "precinct"
          std_beat: "beat"
          std_division: "sector"
          std_latitude: "latitude"
          std_longitude: "longitude"

  # ──────────────────────────────────────────────────────────────────────────
  # SAN FRANCISCO — Socrata
  # ──────────────────────────────────────────────────────────────────────────
  san_francisco:
    display_name: "San Francisco"
    timezone: "America/Los_Angeles"
    aliases: ["sf"]
    sources:
      - source_id: "san_francisco_incidents"
        display_name: "Police Department Incident Reports: 2018 to Present"
        provider: "socrata"
        dataset_id: "wg3w-h783"
        base_url: "https://data.sfgov.org/resource/wg3w-h783.json"
        date_field: "incident_datetime"
        active_from: "2018-01-01"
        active_to: null
        # SF uses its own incident_category labels (title-case but matched
        # case-insensitively).
        spotcrime_category_map:
          HOMICIDE: "Shooting"
          ROBBERY: "Robbery"
          ASSAULT: "Assault"
          BURGLARY: "Burglary"
          LARCENY THEFT: "Theft"
          MOTOR VEHICLE THEFT: "Theft"
          MOTOR VEHICLE THEFT?: "Theft"   # SF literally publishes the trailing '?' on some rows
          STOLEN PROPERTY: "Theft"
          ARSON: "Arson"
          MALICIOUS MISCHIEF: "Vandalism"
          VANDALISM: "Vandalism"
          WEAPONS OFFENSE: "Shooting"
          WEAPONS CARRYING ETC: "Shooting"
          # TODO classifier: Recovered Vehicle / Suspicious Occ / Other Offenses
          # are too broad to map cleanly; left null.
        field_map:
          std_source_record_id: "row_id"
          std_incident_id: "incident_id"
          std_incident_number: "incident_number"
          std_incident_date: "incident_datetime"
          std_reported_date: "report_datetime"
          std_offense_code: "incident_code"
          std_offense_description: "incident_description"
          std_offense_category: "incident_category"
          std_disposition: "resolution"
          std_address: "intersection"
          std_zip_code: null
          std_neighborhood: "analysis_neighborhood"
          std_district: "police_district"
          std_beat: null
          std_division: null
          std_latitude: "latitude"
          std_longitude: "longitude"

  # ──────────────────────────────────────────────────────────────────────────
  # DETROIT — ArcGIS
  # ──────────────────────────────────────────────────────────────────────────
  detroit:
    display_name: "Detroit"
    timezone: "America/New_York"
    aliases: ["detroit_mi"]
    sources:
      - source_id: "detroit_rms_crime_incidents"
        display_name: "Detroit RMS Crime Incidents"
        provider: "arcgis"
        # Detroit RMS exposes its own offense_category labels.
        spotcrime_category_map:
          HOMICIDE: "Shooting"
          ROBBERY: "Robbery"
          ASSAULT: "Assault"
          AGGRAVATED ASSAULT: "Assault"
          BURGLARY: "Burglary"
          LARCENY: "Theft"
          MOTOR VEHICLE THEFT: "Theft"
          STOLEN VEHICLE: "Theft"
          ARSON: "Arson"
          DAMAGE TO PROPERTY: "Vandalism"
          VANDALISM: "Vandalism"
          WEAPONS OFFENSES: "Shooting"
          # TODO classifier: SEX OFFENSES, KIDNAPING, FRAUD intentionally null.
        dataset_id: "8e532daeec1149879bd5e67fdd9c8be0"
        base_url: "https://services2.arcgis.com/qvkbeam7Wirps6zC/arcgis/rest/services/RMS_Crime_Incidents/FeatureServer/0"
        date_field: "incident_occurred_at"
        arcgis_date_field_type: "date"
        object_id_field: "ESRI_OID"
        order_by: "ESRI_OID DESC"
        return_geometry: false
        active_from: "2016-12-13"
        active_to: null
        scope_status: "offense_rows"
        scope_note: "Each row is an incident-offense entry; one incident/report number may appear in multiple rows."
        field_map:
          std_source_record_id: ["incident_entry_id", "crime_id", "ESRI_OID"]
          std_incident_id: ["case_id", "report_number"]
          std_incident_number: "report_number"
          std_incident_date: "incident_occurred_at"
          std_reported_date: ["updated_in_ibr_at", "updated_at", "case_status_updated_at"]
          std_offense_code: "state_offense_code"
          std_offense_description: "offense_description"
          std_offense_category: "offense_category"
          std_disposition: "case_status"
          std_address: "nearest_intersection"
          std_zip_code: "zip_code"
          std_neighborhood: "neighborhood"
          std_district: "police_precinct"
          std_beat: "scout_car_area"
          std_division: "council_district"
          std_latitude: "latitude"
          std_longitude: "longitude"

  # ──────────────────────────────────────────────────────────────────────────
  # PITTSBURGH — CKAN (WPRDC)
  # ──────────────────────────────────────────────────────────────────────────
  pittsburgh:
    display_name: "Pittsburgh"
    timezone: "America/New_York"
    aliases: ["pgh", "pittsburgh_pa"]
    sources:
      - source_id: "pittsburgh_monthly_criminal_activity"
        display_name: "Monthly Criminal Activity"
        provider: "ckan"
        # WPRDC publishes NIBRS_Offense_Category labels.
        spotcrime_category_map:
          MURDER/HOMICIDE: "Shooting"
          HOMICIDE OFFENSES: "Shooting"
          ROBBERY: "Robbery"
          ASSAULT OFFENSES: "Assault"
          BURGLARY/BREAKING & ENTERING: "Burglary"
          LARCENY/THEFT OFFENSES: "Theft"
          MOTOR VEHICLE THEFT: "Theft"
          ARSON: "Arson"
          DESTRUCTION/DAMAGE/VANDALISM OF PROPERTY: "Vandalism"
          WEAPON LAW VIOLATIONS: "Shooting"
          # TODO classifier: SEX OFFENSES, KIDNAPING/ABDUCTION, FRAUD OFFENSES null.
        dataset_id: "bd41992a-987a-4cca-8798-fbe1cd946b07"
        base_url: "https://data.wprdc.org"
        date_field: "ReportedDate"
        ckan_date_field_type: "date"
        order_by: '"ReportedDate" DESC'
        active_from: "2024-01-01"
        active_to: null
        source_status: "rolling_window"
        source_note: "Monthly incident feed on WPRDC (current resource updates monthly and supersedes prior blotter archive)."
        field_map:
          std_source_record_id: ["Report_Number", "_id"]
          std_incident_id: "Report_Number"
          std_incident_number: "Report_Number"
          std_incident_date: "ReportedDate"
          std_reported_date: "ReportedDate"
          std_offense_code: "NIBRS_Offense_Code"
          std_offense_description: ["NIBRS_Coded_Offense", "NIBRS_Offense_Type"]
          std_offense_category: ["NIBRS_Offense_Category", "NIBRS_Crime_Against"]
          std_disposition: null
          std_address: "Block_Address"
          std_zip_code: null
          std_neighborhood: "Neighborhood"
          std_district: "Zone"
          std_beat: "Tract"
          std_division: null
          std_latitude: "YCOORD"
          std_longitude: "XCOORD"

  # ──────────────────────────────────────────────────────────────────────────
  # DALLAS — Socrata
  # ──────────────────────────────────────────────────────────────────────────
  dallas:
    display_name: "Dallas"
    timezone: "America/Chicago"
    sources:
      - source_id: "dallas_incidents"
        display_name: "Dallas Police Incidents"
        provider: "socrata"
        dataset_id: "qv6i-rri7"
        base_url: "https://www.dallasopendata.com/resource/qv6i-rri7.json"
        date_field: "date1"
        active_from: null
        active_to: null
        field_map:
          std_source_record_id: "incidentnum"
          std_incident_id: "servnumid"
          std_incident_number: "incidentnum"
          std_incident_date: "date1"
          std_reported_date: "reporteddate"
          std_offense_code: "nibrs_code"
          std_offense_description: "offincident"
          std_offense_category: "nibrs_group"
          std_disposition: "status"
          std_address: "incident_address"
          std_zip_code: "zip_code"
          std_neighborhood: "ra"
          std_district: "district"
          std_beat: "beat"
          std_division: "division"
          std_latitude: null
          std_longitude: null

  # ──────────────────────────────────────────────────────────────────────────
  # CINCINNATI — Socrata (split: legacy → 2024-06-02; current 2024-06-03+)
  # ──────────────────────────────────────────────────────────────────────────
  cincinnati:
    display_name: "Cincinnati"
    timezone: "America/New_York"
    aliases: ["cincy", "cincinnati_oh"]
    sources:
      - source_id: "cincinnati_incidents_legacy"
        display_name: "PDI Crime Incidents (through 2024-06-02)"
        provider: "socrata"
        dataset_id: "k59e-2pvf"
        base_url: "https://data.cincinnati-oh.gov/resource/k59e-2pvf.json"
        date_field: "date_from"
        active_from: null
        active_to: "2024-06-02"
        # Cincinnati legacy uses Ohio Revised Code-style uppercase descriptions
        # in stars_category / offense. Different vocabulary from the current
        # STARS feed, so each source ships its own map.
        spotcrime_category_map:
          # Theft family
          THEFT: "Theft"
          TAKING THE IDENTITY OF ANOTHER: "Theft"
          UNAUTHORIZED USE OF MOTOR VEHICLE: "Theft"
          MISUSE OF CREDIT CARD: "Theft"
          TELECOMMUNICATIONS FRAUD: "Theft"
          FORGERY: "Theft"
          EXTORTION: "Theft"
          # Robbery
          ROBBERY: "Robbery"
          AGGRAVATED ROBBERY: "Robbery"
          # Burglary / B&E
          BURGLARY: "Burglary"
          AGGRAVATED BURGLARY: "Burglary"
          BREAKING AND ENTERING: "Burglary"
          # Assault family
          ASSAULT: "Assault"
          AGGRAVATED ASSAULT: "Assault"
          FELONIOUS ASSAULT: "Assault"
          AGG VEH HOM/VEH HOM/VEH MNSLGHTER: "Assault"
          DOMESTIC VIOLENCE: "Assault"
          AGGRAVATED MENACING: "Assault"
          MENACING: "Assault"
          ABDUCTION: "Assault"
          KIDNAPPING: "Assault"
          UNLAWFUL RESTRAINT: "Assault"
          ENDANGERING CHILDREN: "Assault"
          AGGRAVATED VEHICULAR ASSAULT: "Assault"
          ETHNIC INTIMIDATION: "Assault"
          TELEPHONE HARASSMENT: "Assault"
          VIOLATE PROTECTION ORDER/CONSENT AGREEMENT: "Assault"
          # Shooting (firearm-specific) + homicide
          IMPROPERLY DISCHARGING FIREARM AT/INTO HABITATION/SCHOOL: "Shooting"
          MURDER: "Shooting"
          # Vandalism
          CRIMINAL DAMAGING/ENDANGERING: "Vandalism"
          CRIMINAL MISCHIEF: "Vandalism"
          VANDALISM: "Vandalism"
          VEHICULAR VANDALISM: "Vandalism"
          DISRUPTING PUBLIC SERVICE: "Vandalism"
          # Sex offenses, public-indecency, custody, importuning — not in
          # 8-cat taxonomy.
        field_map:
          std_source_record_id: ["instanceid", "incident_no"]
          std_incident_id: ["incident_no", "instanceid"]
          std_incident_number: "incident_no"
          std_incident_date: "date_from"
          std_reported_date: "date_reported"
          std_offense_code: "ucr"
          std_offense_description: ["stars_category", "offense"]
          std_offense_category: ["ucr_group", "crime"]
          std_disposition: "clsd"
          std_address: "street_block"
          std_zip_code: ["zip", "zip_code"]
          std_neighborhood: ["sna_neighborhood", "cpd_neighborhood", "community_council_neighborhood"]
          std_district: "dst"
          std_beat: "beat"
          std_division: null
          std_latitude: ["latitude_x", "latitude"]
          std_longitude: ["longitude_x", "longitude"]
      - source_id: "cincinnati_incidents_current"
        display_name: "Reported Crime (STARS Category Offenses) on or after 2024-06-03"
        provider: "socrata"
        dataset_id: "7aqy-xrv9"
        base_url: "https://data.cincinnati-oh.gov/resource/7aqy-xrv9.json"
        date_field: "datefrom"
        active_from: "2024-06-03"
        active_to: null
        # Cincinnati current STARS feed: small vocabulary (~10 distinct
        # values). "Part 2" is a catchall admin bucket (~44% of volume)
        # that we deliberately leave unmapped so it filters out.
        spotcrime_category_map:
          Personal/Other Theft: "Theft"
          Theft from Auto: "Theft"
          Auto Theft: "Theft"
          Burglary/BE: "Burglary"
          Robbery: "Robbery"
          Agg Assault: "Assault"
          Strangulation: "Assault"
          Homicide: "Shooting"
          # "Rape" and "Part 2" intentionally unmapped (not in 8-cat).
        field_map:
          std_source_record_id: "incident_no"
          std_incident_id: "incident_no"
          std_incident_number: "incident_no"
          std_incident_date: "datefrom"
          std_reported_date: "datereported"
          std_offense_code: null
          std_offense_description: ["stars_category", "offense"]
          std_offense_category: ["type", "crime"]
          std_disposition: "clsd"
          std_address: "address_x"
          std_zip_code: null
          std_neighborhood: ["sna_neighborhood", "cpd_neighborhood", "cc_neighborhood"]
          std_district: null
          std_beat: "beat"
          std_division: null
          std_latitude: ["latitude_x", "latitude"]
          std_longitude: ["longitude_x", "longitude"]

  # ──────────────────────────────────────────────────────────────────────────
  # PROVIDENCE — Socrata (rolling 180-day case log)
  # ──────────────────────────────────────────────────────────────────────────
  providence:
    display_name: "Providence"
    timezone: "America/New_York"
    sources:
      - source_id: "providence_case_log"
        display_name: "Providence Police Case Log - Past 180 days"
        provider: "socrata"
        dataset_id: "rz3y-pz8v"
        base_url: "https://data.providenceri.gov/resource/rz3y-pz8v.json"
        date_field: "reported_date"
        active_from: null
        active_to: null
        source_status: "rolling_window"
        source_note: "Feed publishes a rolling case log (about the past 180 days), not full historical coverage."
        field_map:
          std_source_record_id: "casenumber"
          std_incident_id: "casenumber"
          std_incident_number: "casenumber"
          std_incident_date: "reported_date"
          std_reported_date: "reported_date"
          std_offense_code: "statute_code"
          std_offense_description: "offense_desc"
          std_offense_category: "statute_desc"
          std_disposition: null
          std_address: "location"
          std_zip_code: null
          std_neighborhood: null
          std_district: null
          std_beat: null
          std_division: null
          std_latitude: null
          std_longitude: null

  # ──────────────────────────────────────────────────────────────────────────
  # GAINESVILLE — Socrata
  # ──────────────────────────────────────────────────────────────────────────
  gainesville:
    display_name: "Gainesville"
    timezone: "America/New_York"
    aliases: ["gainesville_fl"]
    sources:
      - source_id: "gainesville_crime_responses"
        display_name: "Crime Responses"
        provider: "socrata"
        dataset_id: "gvua-xt9q"
        base_url: "https://data.cityofgainesville.org/resource/gvua-xt9q.json"
        date_field: "offense_date"
        active_from: null
        active_to: null
        # Gainesville Crime Responses feed has no std_offense_category;
        # mapping is driven entirely by the narrative description. Plenty
        # of non-criminal admin entries (Suspicious Incident, Information,
        # Found/Lost Property, Tow Report, Sick/Injured Person, Baker Act,
        # DCF Investigations, Death Investigation, Assist Citizen/Other
        # Agency, etc.) are intentionally left unmapped.
        spotcrime_category_map:
          # ---- Theft ----
          Theft Petit - Retail: "Theft"
          Theft Petit - Other: "Theft"
          Theft Petit - Bicycle: "Theft"
          Theft Petit - From Building: "Theft"
          Theft Petit - From Vehicle/not Parts: "Theft"
          Theft Petit - From Vehicle (vehicle Parts): "Theft"
          Theft Petit - Pocket-picking: "Theft"
          Theft Petit - Purse Snatching: "Theft"
          Theft Grand - Other: "Theft"
          Theft Grand - Retail: "Theft"
          Theft Grand - Bicycle: "Theft"
          Theft Grand - From Building: "Theft"
          Theft Grand - Trailer: "Theft"
          Theft Grand -firearm: "Theft"
          Theft Grand - Purse Snatching: "Theft"
          Stolen Vehicle (auto): "Theft"
          Stolen Vehicle (scooter): "Theft"
          Stolen Vehicle (motorcycle): "Theft"
          Stolen Vehicle (other): "Theft"
          Identity Theft: "Theft"
          Lost/stolen Vehicle Tag / Decal: "Theft"
          Fraud (all Other): "Theft"
          Fraud (obtain Money/property by False Pretense): "Theft"
          Fraud (credit Card/atm): "Theft"
          Fraud (forgery): "Theft"
          Fraud (impersonation): "Theft"
          Fraud (worthless Check): "Theft"
          Extortion/threats: "Theft"
          Have Forged Note in Possession: "Theft"
          Utter Forged/counterfeit Bill: "Theft"
          Unlawful Possession of Another`s Personal Id Info: "Theft"
          Unauthorized Poss Manuf Fl Dl: "Theft"
          Exploitation of the Elderly/disabled: "Theft"
          # ---- Robbery ----
          Robbery: "Robbery"
          Robbery (armed): "Robbery"
          Robbery (strong Arm): "Robbery"
          Robbery by Sudden Snatching: "Robbery"
          # ---- Burglary ----
          Burglary to Residence: "Burglary"
          Burglary to Business: "Burglary"
          Burglary to Conveyance: "Burglary"
          Burglary to a Structure: "Burglary"
          # ---- Assault (battery, simple/agg, domestic, dating, threats) ----
          Battery (simple): "Assault"
          Battery (felony): "Assault"
          Battery (aggravated): "Assault"
          Battery (police Officer): "Assault"
          Battery (security Guard/officer): "Assault"
          Battery (simple – With Other Weapon): "Assault"
          Battery on a Person 65 Yoa or Older: "Assault"
          Battery on a Emergency Medicalcare Provider: "Assault"
          Battery on a School Board Employee: "Assault"
          Battery on Detention or Commitment Facility Staff (simple): "Assault"
          Assault (simple): "Assault"
          Assault (aggravated): "Assault"
          Aggravated Assault: "Assault"
          Assault on Leo: "Assault"
          Affray: "Assault"
          Domestic Simple Battery: "Assault"
          Domestic Aggravated Battery: "Assault"
          Domestic Felony Battery Repeat Offender: "Assault"
